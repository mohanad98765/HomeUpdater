[project]
name = "homeupdater-backend"
version = "0.1.0"
description = "HomeUpdater backend — Network device discovery and update management"
requires-python = ">=3.11"

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "alembic/"

[tool.ruff]
line-length = 100
target-version = "py311"
# Autogenerated migrations are not hand-formatted.
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
# B008: FastAPI intentionally calls Depends()/Query() in argument defaults.
ignore = ["B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["."]
